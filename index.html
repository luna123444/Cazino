<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: gold; font-family: 'Arial', sans-serif; text-align: center; padding: 20px; }
        .balance { font-size: 24px; margin-bottom: 20px; color: white; }
        .slot-machine { background: #333; padding: 30px; border-radius: 15px; border: 3px solid gold; margin-bottom: 20px; }
        .slots { font-size: 50px; letter-spacing: 10px; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; margin: 5px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-spin { background: linear-gradient(to bottom, #ff4e50, #f9d423); color: black; font-size: 18px; }
        .btn-withdraw { background: #444; color: #888; }
        .status { font-size: 12px; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="balance">Баланс: <span id="bal">0</span> грн</div>
    
    <div class="slot-machine">
        <div class="slots" id="slots">7 7 7</div>
        <button class="btn-spin" onclick="spin()">КРУТИТЬ (10 грн)</button>
    </div>

    <button class="btn-withdraw" onclick="withdraw()">ВЫВЕСТИ СРЕДСТВА</button>
    <div id="status" class="status"></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let balance = 0;

        function spin() {
            // Имитация прокрутки: всегда проигрыш или "почти" победа
            document.getElementById('slots').innerText = "🍒 7 🍋";
            document.getElementById('status').innerText = "Попробуйте еще раз!";
        }

        function withdraw() {
            if (balance <= 0) {
                alert("Ошибка: Недостаточно средств на балансе!");
            } else {
                document.getElementById('status').innerText = "Заявка принята. Ожидайте вывода (4-96 часов)...";
            }
        }
    </script>
</body>
</html>
